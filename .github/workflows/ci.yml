name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pizza
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pizza"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.31.0"

      - name: Set up kind
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: pizza-ci

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          npm install -g newman

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=70

      - name: Build Docker image
        run: docker build -t pizza-ordering-service:${{ github.sha }} .

      - name: Load image into kind
        run: kind load docker-image pizza-ordering-service:${{ github.sha }} --name pizza-ci

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/pizza-ordering-service \
            pizza-ordering-service=pizza-ordering-service:${{ github.sha }}
          kubectl rollout status deployment/pizza-ordering-service --timeout=120s

      - name: Smoke test container
        run: |
          kubectl port-forward service/pizza-ordering-service 8000:80 >/tmp/pizza-port-forward.log 2>&1 &
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:8000/health; do sleep 2; done'

      - name: Run Newman collection
        run: newman run postman/collection.json --env-var baseUrl=http://127.0.0.1:8000
