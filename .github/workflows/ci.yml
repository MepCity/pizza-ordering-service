name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pizza
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pizza"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          npm install -g newman

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=70

      - name: Build Docker image
        run: docker build -t pizza-ordering-service:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name pizza-app -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./pizza.db \
            -e S3_ARCHIVE_ENABLED=false \
            pizza-ordering-service:${{ github.sha }}
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:8000/health; do sleep 2; done'

      - name: Run Newman collection
        run: newman run postman/collection.json --env-var baseUrl=http://127.0.0.1:8000
