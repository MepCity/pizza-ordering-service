apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pizza-ordering-service.fullname" . }}-config
data:
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  S3_ARCHIVE_ENABLED: {{ .Values.config.s3ArchiveEnabled | quote }}
  S3_BUCKET_NAME: {{ .Values.config.s3BucketName | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  AWS_ENDPOINT_URL: {{ .Values.config.awsEndpointUrl | quote }}
  OTEL_ENABLED: {{ .Values.config.otelEnabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterEndpoint | quote }}
